<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Memories ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe0ec, #ffd6e0, #fff0f5);
}

/* ===== INTRO ===== */
.college-intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #d9b6bb;
    text-align: center;
}

.college-intro h1 {
    font-size: 48px;
    max-width: 900px;
}

.subtext {
    margin-top: 20px;
    font-size: 20px;
}

/* ===== WHATSAPP ===== */
.conversation-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#convTitle {
    font-size: 36px;
    opacity: 0;
    transform: translateX(-100px);
    transition: 1s;
}
#convTitle.show {
    opacity: 1;
    transform: translateX(0);
}

.wa-label {
    color: #25D366;
    opacity: 0;
}
.wa-label.show {
    opacity: 1;
}

.chat-container {
    width: 520px;
    background: #e5ddd5;
    padding: 25px;
    border-radius: 15px;
}

.chat-line {
    padding: 14px;
    margin: 10px;
    border-radius: 12px;
    max-width: 70%;
    opacity: 0;
}

.you { background: #fff; }
.her { background: #dcf8c6; margin-left: auto; }

.show-line { opacity: 1; }

/* SEMMA */
.semma {
    margin-top: 30px;
    font-size: 40px;
    color: #ff4d6d;
    opacity: 0;
    transform: scale(0.8);
    transition: 0.7s;
}
.semma.show {
    opacity: 1;
    transform: scale(1);
}

/* ===== CALL ===== */
.call-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.call-title {
    font-size: 36px;
    opacity: 0;
    transform: translateX(100px);
    transition: 1s;
}
.call-title.show {
    opacity: 1;
    transform: translateX(0);
}

/* calling animation */
.calling {
    text-align: center;
}

.phone-ring {
    font-size: 60px;
    animation: ring 1s infinite;
}

@keyframes ring {
    0% { transform: rotate(0); }
    25% { transform: rotate(-10deg); }
    50% { transform: rotate(10deg); }
    75% { transform: rotate(-10deg); }
    100% { transform: rotate(0); }
}

/* call box FIXED */
.call-box {
    width: 500px;
    background: #1c1c1c;
    color: white;
    padding: 25px;
    border-radius: 20px;
    font-size: 18px;
}

.call-line {
    margin: 15px 0;
    opacity: 0;
}

.show-call {
    opacity: 1;
}

/* hidden */
.hidden {
    display: none;
}

/* ===== NEXT ARROW ===== */
#nextArrow {
    position: fixed;
    bottom: 30px;
    right: 30px;
    font-size: 30px;
    background: #ff4d6d;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    opacity: 0;
    transition: 0.4s;
}

#nextArrow.show {
    opacity: 1;
}

#nextArrow:hover {
    transform: scale(1.2);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="college-intro">
    <h1>Somewhere between classes and chaos… we found each other ❤️</h1>
    <p class="subtext">And everything started to feel different…</p>
</div>

<!-- WHATSAPP -->
<div class="conversation-section">

    <h2 id="convTitle">Do you remember this moment… 💭</h2>
    <p class="wa-label">on WhatsApp 💬</p>

    <div class="chat-container">
        <p class="chat-line her" id="line1"></p>
        <p class="chat-line you" id="line2"></p>
        <p class="chat-line her" id="line3"></p>
        <p class="chat-line you" id="line4"></p>
        <p class="chat-line her" id="line5"></p>
    </div>

    <p id="semmaText" class="semma">Semma la 😏</p>

</div>

<!-- CALL -->
<div class="call-section">

    <h2 class="call-title" id="callTitle">📞 Do you remember this call…</h2>

    <div id="callingScreen" class="calling hidden">
        <div class="phone-ring">📞</div>
        <p>Calling…</p>
    </div>

    <div id="callBox" class="call-box hidden">
        <p class="call-line" id="c1"></p>
        <p class="call-line" id="c2"></p>
        <p class="call-line" id="c3"></p>
    </div>

</div>

<!-- NEXT ARROW -->
<div id="nextArrow" onclick="goNext()">➜</div>

<script>

/* TYPEWRITER */
function typeText(el, text, speed, callback) {
    let i = 0;
    el.classList.add("show-call");

    function typing() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        } else if (callback) callback();
    }
    typing();
}

/* WHATSAPP */
let done1 = false;

window.addEventListener("scroll", () => {
    const sec = document.querySelector(".conversation-section");

    if (sec.getBoundingClientRect().top < window.innerHeight - 100 && !done1) {
        done1 = true;

        convTitle.classList.add("show");
        document.querySelector(".wa-label").classList.add("show");

        setTimeout(() => {
            typeText(line1, "Kavin 👀", 120, () => {
                setTimeout(() => {
                    typeText(line2, "Yes… exactly 😄", 120, () => {
                        setTimeout(() => {
                            typeText(line3, "Ohh okay good 👍", 120, () => {
                                setTimeout(() => {
                                    typeText(line4, "For BEEE I took Amphere ⚡", 120, () => {
                                        setTimeout(() => {
                                            typeText(line5, "Ok fine 😌", 120, () => {
                                                setTimeout(() => {
                                                    semmaText.classList.add("show");
                                                }, 600);
                                            });
                                        }, 800);
                                    });
                                }, 800);
                            });
                        }, 800);
                    });
                }, 800);
            });
        }, 1000);
    }
});

/* CALL */
let done2 = false;

window.addEventListener("scroll", () => {
    const sec = document.querySelector(".call-section");

    if (sec.getBoundingClientRect().top < window.innerHeight - 100 && !done2) {
        done2 = true;

        callTitle.classList.add("show");

        setTimeout(() => {
            callingScreen.classList.remove("hidden");
        }, 500);

        setTimeout(() => {
            callingScreen.classList.add("hidden");
            callBox.classList.remove("hidden");

            typeText(document.getElementById("c1"), "Dei nee chemistry la 95 😳", 120, () => {
                setTimeout(() => {
                    typeText(document.getElementById("c2"), "Vaipe illa… naan eluthave illa 😂", 120, () => {
                        setTimeout(() => {
                            typeText(document.getElementById("c3"), "Dei seriously nee 95… sir sonnaru 😌", 120);
                        }, 800);
                    });
                }, 800);
            });

        }, 3000);
    }
});

/* NEXT PAGE */
function goNext() {
    window.location.href = "memories.html";
}

/* SHOW ARROW */
window.addEventListener("scroll", () => {
    const callSec = document.querySelector(".call-section");

    if (callSec.getBoundingClientRect().top < window.innerHeight - 100) {
        nextArrow.classList.add("show");
    }
});

</script>

</body>
</html>
