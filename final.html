<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final ❤️</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';

    /* 💖 PINK BACKGROUND */
    background:linear-gradient(135deg, #ff4d6d, #ff758f, #ff8fab, #ffb3c6);

    overflow:hidden;
}

/* SECTION BASE */
.section{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:1s;
}

/* SLIDE */
.hidden{
    transform:translateX(100%);
    opacity:0;
}
.active{
    transform:translateX(0);
    opacity:1;
}

/* 💖 DARK PINK TEXT */
h1{
    font-size:40px;
    color:#b3003c; /* dark pink */
    text-shadow:0 4px 12px rgba(0,0,0,0.3);
}

p{
    font-size:20px;
    color:#cc0052; /* softer dark pink */
    text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* BUTTON */
button{
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg, #ff8fab, #ffb3c6);
    color:#b3003c; /* dark pink text */
    cursor:pointer;
    font-size:18px;
    margin-top:20px;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

/* BOARD */
.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:12px;
    margin-top:20px;
}

/* CELLS */
.cell{
    width:100px;
    height:100px;
    background:#ffe4ec;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    cursor:pointer;
    color:#b3003c; /* dark pink symbols */
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

/* VIDEO */
video{
    width:85%;
    max-width:900px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- SECTION 1 -->
<div id="intro" class="section active">
    <h1>Let’s play the last game… ❤️</h1>
    <p>and have your surprise 😌</p>

    <button id="yesBtn" style="opacity:0;">Yes 💖</button>
</div>

<!-- SECTION 2 -->
<div id="gameSection" class="section hidden">
    <h1>❤️ vs 🎈</h1>
    <p>You always win 😏</p>

    <div class="board" id="board"></div>
</div>

<!-- SECTION 3 -->
<div id="videoSection" class="section hidden">
    <h1>Your surprise ❤️</h1>

    <video id="finalVideo" controls>
        <source src="vid.mp4" type="video/mp4">
    </video>
</div>

<script>

/* BUTTON APPEAR */
setTimeout(()=>{
    yesBtn.style.opacity=1;
},800);

/* NAVIGATION */
yesBtn.onclick = ()=>{
    intro.classList.remove("active");
    intro.classList.add("hidden");

    gameSection.classList.remove("hidden");
    gameSection.classList.add("active");
};

/* GAME */
const board = document.getElementById("board");
let cells = Array(9).fill("");
let gameOver = false;

for(let i=0;i<9;i++){
    const cell = document.createElement("div");
    cell.className="cell";
    cell.onclick=()=>playerMove(i,cell);
    board.appendChild(cell);
}

function playerMove(i,cell){
    if(cells[i]!=="" || gameOver) return;

    cells[i]="❤️";
    cell.innerHTML="❤️";

    if(checkWin("❤️")){
        endGame();
        return;
    }

    setTimeout(aiMove,300);
}

function aiMove(){
    let empty = cells.map((v,i)=>v===""?i:null).filter(v=>v!==null);
    if(empty.length===0) return;

    let move = empty[Math.floor(Math.random()*empty.length)];
    cells[move]="🎈";
    board.children[move].innerHTML="🎈";
}

function checkWin(s){
    const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return w.some(c=>c.every(i=>cells[i]===s));
}

function endGame(){
    gameOver=true;

    setTimeout(()=>{
        gameSection.classList.remove("active");
        gameSection.classList.add("hidden");

        videoSection.classList.remove("hidden");
        videoSection.classList.add("active");

        finalVideo.play();
    },800);
}

</script>

</body>
</html>
